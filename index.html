  🎵 Play Music

🎵 Play Music
</button>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#02142b;
  overflow:hidden;
  color:white;
}

.page{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hidden{
  display:none;
}

h1{
  font-size:4rem;
  text-shadow:0 0 20px #4fc3ff;
}

.subtitle{
  margin-top:10px;
  color:#b8e8ff;
}

button{
  margin-top:30px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#4fc3ff;
  color:white;
  font-size:1rem;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 0 20px #4fc3ff;
}

button:hover{
  transform:scale(1.1);
}

.card,
.scoreboard{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:25px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(79,195,255,.5);
  max-width:500px;
}

.typing{
  margin-top:20px;
  line-height:1.8;
  color:#d7f3ff;
}

.score{
  display:flex;
  justify-content:space-between;
  margin:15px 0;
  font-size:1.2rem;
}

.ball{
  width:90px;
  height:90px;
  background:pink;
  border-radius:50%;
  margin-top:40px;
  animation:bounce 1s infinite;
  box-shadow:0 0 30px white ;
}

@keyframes bounce{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-40px);
  }
}

.stars{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  z-index:-1;
}

.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  animation:float linear infinite;
  box-shadow:0 0 10px white;
}

@keyframes float{

  from{
    transform:translateY(100vh);
    opacity:1;
  }

  to{
    transform:translateY(-10vh);
    opacity:0;
  }

}

@keyframes moveStars{
  from{
    background-position:0 0;
  }
  to{
    background-position:10000px 5000px;
  }
}

.final-text{
  animation:glowText 2s infinite alternate;
}

@keyframes glowText{
  from{
    text-shadow:0 0 10px #4fc3ff;
  }
  to{
    text-shadow:0 0 40px #4fc3ff;
  }
}

.glow{
  width:250px;
  height:250px;
  background:#4fc3ff;
  filter:blur(120px);
  position:absolute;
  z-index:-1;
}
  .music-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:1000;
}
  </style>

  <script>
    function nextPage(page){

  document.querySelectorAll(".page").forEach(function(p){
    p.classList.add("hidden");
  });

  document
    .getElementById("page" + (page + 1))
    .classList.remove("hidden");
}
const starsContainer = document.querySelector(".stars");

for(let i = 0; i < 120; i++){

  let star = document.createElement("div");

  star.classList.add("star");

  star.style.left = Math.random() * 100 + "vw";

  star.style.animationDuration =
    Math.random() * 5 + 3 + "s";

  star.style.opacity = Math.random();

  star.style.width =
    star.style.height =
    Math.random() * 4 + "px";

  starsContainer.appendChild(star);
}

    function playMusic(){

  document
    .getElementById("music")
    .play();
}
  </script>
